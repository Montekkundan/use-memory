name: ❓ Question
description: Ask a question about setup, customization, or deployment.
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Check [README](https://github.com/Montekkundan/use-memory#readme) and [docs/](https://github.com/Montekkundan/use-memory/tree/main/docs) first. For open-ended discussion, consider [GitHub Discussions](https://github.com/Montekkundan/use-memory/discussions).
  - type: textarea
    id: description
    attributes:
      label: Question
      description: What are you trying to do, and where are you stuck?
    validations:
      required: true
